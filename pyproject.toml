[project]
name = "llmdiff"
version = "0.1.0"
description = "git diff for LLM prompts"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["llm", "prompt-engineering", "cli", "developer-tools", "ollama"]

dependencies = [
    "typer>=0.12",
    "pydantic>=2.0",
    "httpx>=0.27",
    "rich>=13.0",
    "sentence-transformers>=3.0",
    "scikit-learn>=1.3",
]

[project.scripts]
llmdiff = "llmdiff.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]