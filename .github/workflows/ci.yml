name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        strategy:
            matrix:
                python-version: [ "3.10", "3.11", "3.12" ]
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python ${{ matrix.python-version }}
              run: uv python install ${{ matrix.python-version }}

            - name: Install dependencies
              run: uv sync --all-extras --group dev

            - name: Run tests
              run: uv run pytest tests/ -v

            - name: Verify CLI failure policy flags
              run: |
                  uv run llmdiff --help > /tmp/llmdiff-help.txt
                  grep -q -- "--fail-on-changed" /tmp/llmdiff-help.txt
                  grep -q -- "--fail-if-avg-below" /tmp/llmdiff-help.txt
                  grep -q -- "--fail-if-any-below-threshold" /tmp/llmdiff-help.txt
